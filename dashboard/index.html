<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUNO Tracker Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      padding: 20px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #fff;
    }
    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    select, button {
      background: #1a1a1a;
      color: #e0e0e0;
      border: 1px solid #333;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    select:hover, button:hover { border-color: #555; }
    button.active { background: #2563eb; border-color: #2563eb; color: #fff; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }
    .card {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 16px;
      border: 1px solid #222;
    }
    .card h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #ccc;
    }
    .chart-container {
      position: relative;
      height: 300px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 8px 10px;
      text-align: left;
      border-bottom: 1px solid #222;
    }
    th { color: #888; font-weight: 600; }
    td { color: #ccc; }
    tr:hover td { background: #222; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .trend-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .trend-up { background: #064e3b; color: #34d399; }
    .trend-down { background: #7f1d1d; color: #fca5a5; }
    .trend-same { background: #333; color: #888; }
    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }
    .stat-box {
      background: #222;
      padding: 12px 16px;
      border-radius: 6px;
      flex: 1;
    }
    .stat-box .label { font-size: 12px; color: #888; }
    .stat-box .value { font-size: 24px; font-weight: 700; color: #fff; }
    .loading { text-align: center; padding: 40px; color: #666; }
    #file-input-area {
      background: #1a1a1a;
      border: 2px dashed #333;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      margin-bottom: 24px;
      cursor: pointer;
    }
    #file-input-area:hover { border-color: #555; }
    #file-input-area input { display: none; }
  </style>
</head>
<body>
  <h1>SUNO Tracker Dashboard</h1>
  <p class="subtitle">楽曲データの推移とトレンド分析</p>

  <div id="file-input-area">
    <p>CSVファイルをドラッグ＆ドロップ、またはクリックして選択</p>
    <p style="font-size:12px;color:#666;margin-top:4px;">data/songs.csv と data/trends.csv を読み込みます</p>
    <input type="file" id="file-input" multiple accept=".csv">
  </div>

  <div class="controls">
    <select id="artist-select">
      <option value="all">全アーティスト</option>
    </select>
    <select id="metric-select">
      <option value="plays">再生数</option>
      <option value="likes">いいね数</option>
      <option value="comments">コメント数</option>
    </select>
    <select id="period-select">
      <option value="all">全期間</option>
      <option value="24h">24時間</option>
      <option value="7d">7日間</option>
      <option value="30d">30日間</option>
    </select>
  </div>

  <div class="stats-row" id="stats-row" style="display:none;">
    <div class="stat-box">
      <div class="label">総再生数</div>
      <div class="value" id="stat-plays">-</div>
    </div>
    <div class="stat-box">
      <div class="label">総いいね</div>
      <div class="value" id="stat-likes">-</div>
    </div>
    <div class="stat-box">
      <div class="label">楽曲数</div>
      <div class="value" id="stat-songs">-</div>
    </div>
    <div class="stat-box">
      <div class="label">トレンドランクイン</div>
      <div class="value" id="stat-trending">-</div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>再生数推移</h2>
      <div class="chart-container">
        <canvas id="plays-chart"></canvas>
      </div>
    </div>
    <div class="card">
      <h2>いいね推移</h2>
      <div class="chart-container">
        <canvas id="likes-chart"></canvas>
      </div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>楽曲一覧（最新データ）</h2>
      <div style="overflow-x:auto;">
        <table id="songs-table">
          <thead>
            <tr>
              <th>曲名</th>
              <th>アーティスト</th>
              <th class="num">再生数</th>
              <th class="num">いいね</th>
              <th class="num">コメント</th>
              <th class="num">変化</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <h2>トレンドランクイン履歴</h2>
      <div style="overflow-x:auto;">
        <table id="trends-table">
          <thead>
            <tr>
              <th>日時</th>
              <th>地域</th>
              <th>期間</th>
              <th>曲名</th>
              <th class="num">順位</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/charts.js"></script>
</body>
</html>
