name: SUNO Tracker

on:
  schedule:
    - cron: '0 * * * *'  # 毎時（新曲なければ3時間おきにスキップ）
  workflow_dispatch:  # 手動実行

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Setup config
        run: |
          cp config.example.json config.json
          node -e "
            const fs = require('fs');
            const c = JSON.parse(fs.readFileSync('config.json', 'utf-8'));
            c.notification.discordWebhookUrl = process.env.DISCORD_WEBHOOK_URL || '';
            c.notification.enabled = !!process.env.DISCORD_WEBHOOK_URL;
            fs.writeFileSync('config.json', JSON.stringify(c, null, 2));
          "
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Run tracker
        run: node src/index.js

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
